name: Allo Screener

on:
  schedule:
    - cron: "5 */4 * * *"   # her 4 saatte bir (UTC) calisir
  workflow_dispatch: {}       # istersen elle de "Run workflow" ile tetikleyebilirsin

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: Screener'i calistir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener.py

      - name: State dosyasini geri commit'le
        run: |
          git config user.name "allo-screener-bot"
          git config user.email "actions@github.com"
          git add screener_state.json
          git diff --quiet --cached || git commit -m "state guncelle [skip ci]"
          git push
