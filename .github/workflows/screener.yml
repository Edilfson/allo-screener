name: Allo Screener

on:
  schedule:
    - cron: "5 */4 * * *"   # her 4 saatte bir (UTC)
  workflow_dispatch: {}       # istersen elle de "Run workflow" ile tetikleyebilirsin

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: Screener'i calistir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_SIGNALS: ${{ secrets.TOPIC_SIGNALS }}
          TOPIC_RESULTS: ${{ secrets.TOPIC_RESULTS }}
          TOPIC_SUMMARY: ${{ secrets.TOPIC_SUMMARY }}
        run: python screener.py

      - name: State dosyasini geri commit'le
        continue-on-error: true
        run: |
          git config user.name "allo-screener-bot"
          git config user.email "actions@github.com"
          # kalp atisi: gunde bir kez degisir -> repo aktif kalir,
          # GitHub 60 gun hareketsizlik kuralindan dolayi cron'u durdurmaz
          date -u +"son calisma: %Y-%m-%d" > last_run.txt
          git add positions.json last_run.txt
          git diff --quiet --cached || git commit -m "state guncelle [skip ci]"
          # repo bu arada degismis olabilir: once cek (rebase), sonra push et - 3 deneme
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push basarili."
              exit 0
            fi
            echo "Push denemesi $i basarisiz, tekrar deneniyor..."
            sleep 5
          done
          echo "Push yapilamadi (tarama yine de calisti, sinyaller gonderildi)."
